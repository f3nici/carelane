# Build & push the CareLane image to Docker Hub.
#
# Deployment is manual: Actions → "Build & Push Docker image" → Run workflow,
# type the version tag (e.g. 1.2.0) and tick "also tag latest" if wanted.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME — your Docker Hub username
#   DOCKERHUB_TOKEN    — a Docker Hub access token (hub.docker.com → Account Settings → Security)
#
# Image is pushed as <DOCKERHUB_USERNAME>/carelane:<version> (+ :latest when ticked).

name: Build & Push Docker image

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.2.0)'
        required: true
        type: string
      push_latest:
        description: 'Also tag latest'
        required: false
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve image tags
        id: tags
        env:
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/carelane
          VERSION: ${{ inputs.version }}
          PUSH_LATEST: ${{ inputs.push_latest }}
        run: |
          VERSION="${VERSION#v}"   # accept both 1.2.0 and v1.2.0
          TAGS="$IMAGE:$VERSION"
          if [ "$PUSH_LATEST" = "true" ]; then
            TAGS="$TAGS,$IMAGE:latest"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
