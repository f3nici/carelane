# Build & push the CareLane image to Docker Hub.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME — your Docker Hub username
#   DOCKERHUB_TOKEN    — a Docker Hub access token (hub.docker.com → Account Settings → Security)
#
# Image is pushed as <DOCKERHUB_USERNAME>/carelane with:
#   - `latest` on pushes to main
#   - the semver tag (e.g. 1.2.0) on version tags like v1.2.0

name: Build & Push Docker image

on:
  push:
    tags: ['v*']
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/carelane
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
