services:
  carelane:
    image: f3nici/carelane:latest # Recommend to use version tags
    container_name: carelane
    ports:
      - 8000:3778
    environment:
      PORT: 3778 # Internal Port
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:?set ENCRYPTION_SECRET in .env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-} #Optional
      DEFAULT_USERNAME: ${DEFAULT_USERNAME:-admin}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD:-changeme}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_RETENTION: ${BACKUP_RETENTION:-14}
      BACKUP_TIME: ${BACKUP_TIME:-02:00}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-} # Optional: Google Calendar sync
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-} # Optional: Google Calendar sync
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-} # e.g. https://your-domain/api/v1/schedule/google/callback
      SQUARE_ACCESS_TOKEN: ${SQUARE_ACCESS_TOKEN:-} # Optional: Square invoicing
      SQUARE_ENVIRONMENT: ${SQUARE_ENVIRONMENT:-sandbox} # 'sandbox' or 'production'
      SQUARE_LOCATION_ID: ${SQUARE_LOCATION_ID:-} # Optional: auto-detected on Test connection
      # Optional: pin the passkey relying-party id/origin when behind a Host-rewriting
      # proxy (auto-derived from the request when blank). RP id = registrable domain,
      # origin = full URL, e.g. carelane.example.com / https://carelane.example.com
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-}
      LOG_FORMAT: ${LOG_FORMAT:-json} # 'json' (log shippers) or 'pretty'
      METRICS_ENABLED: ${METRICS_ENABLED:-false} # Optional: Prometheus scrape at /metrics
      METRICS_TOKEN: ${METRICS_TOKEN:-} # Optional: require a Bearer token for /metrics
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - carelane_net
networks:
  carelane_net:
    driver: bridge
    enable_ipv6: false
