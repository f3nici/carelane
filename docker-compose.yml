services:
  carelane:
    image: f3nici/carelane:latest # Recommend to use version tags
    container_name: carelane
    ports:
      - 8000:3778
    environment:
      PORT: 3778 # Internal Port
      NODE_ENV: production
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET in .env}
      ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:?set ENCRYPTION_SECRET in .env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEFAULT_USERNAME: ${DEFAULT_USERNAME:-admin}
      DEFAULT_PASSWORD: ${DEFAULT_PASSWORD:-changeme}
      BACKUP_ENABLED: ${BACKUP_ENABLED:-true}
      BACKUP_RETENTION: ${BACKUP_RETENTION:-14}
      BACKUP_TIME: ${BACKUP_TIME:-02:00}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      SQUARE_ACCESS_TOKEN: ${SQUARE_ACCESS_TOKEN:-}
      SQUARE_ENVIRONMENT: ${SQUARE_ENVIRONMENT:-sandbox}
      NTFY_TOKEN: ${NTFY_TOKEN:-}
      APP_BASE_URL: ${APP_BASE_URL:-}
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-}
      LOG_FORMAT: ${LOG_FORMAT:-pretty}
      METRICS_ENABLED: ${METRICS_ENABLED:-false}
      METRICS_TOKEN: ${METRICS_TOKEN:-}
      DEMO_MODE: ${DEMO_MODE:-false}
      DEMO_RESET_HOURS: ${DEMO_RESET_HOURS:-6}
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped
    networks:
      - carelane_net
networks:
  carelane_net:
    driver: bridge
    enable_ipv6: false
